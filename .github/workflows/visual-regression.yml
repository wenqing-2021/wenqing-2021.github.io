name: Visual regression checks

on:
  pull_request:
    branches: [main, master, v1.0-dev]
    paths:
      - "_config.yml"
      - "_data/**"
      - "_bibliography/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "assets/**"
      - "test/visual/**"
      - ".github/workflows/visual-regression.yml"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
  push:
    branches: [v1.0-dev]
    paths:
      - "_config.yml"
      - "_data/**"
      - "_bibliography/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "assets/**"
      - "test/visual/**"
      - ".github/workflows/visual-regression.yml"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout candidate 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps 📦
        run: npm ci

      - name: Install Jupyter + ImageMagick runtime deps 🧰
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick python3-pip
          pip3 install --user jupyter nbconvert

      - name: Install Playwright browser 🧪
        run: npx playwright install --with-deps chromium webkit

      - name: Run visual checks 👀
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          npm run test:visual -- --reporter=line

      - name: Upload Playwright report 📄
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
