    Professional Experience:
      - company: Li Auto Inc.
        position: Autonomous Driving Algorithm Engineer — Open-loop RL for Velocity Planning
        location: China
        start_date: 2026-01
        end_date: 2026-06
        summary: Developed reinforcement-learning-based velocity planning for production urban autonomous driving.
        highlights:
          - Designed collision-risk assessment based on time-to-collision for reinforcement learning rewards.
          - Developed traffic-aware driving-efficiency objectives and data-mining tools for training-data analysis.
          - Contributed to a method deployed in production vehicles.

      - company: Li Auto Inc.
        position: Autonomous Driving Algorithm Engineer — Urban Trajectory Planning
        location: China
        start_date: 2025-05
        end_date: 2025-12
        summary: Built learning-based interaction and trajectory modules for complex urban driving scenarios.
        highlights:
          - Developed a transformer-based interaction module for obstacle-level overtake, yield, and ignore decisions.
          - Built a transformer-based ego-trajectory module with safety-oriented loss design.
          - Generated supervised decision labels using a rule-based pipeline and supported production deployment.

      - company: Li Auto Inc.
        position: Autonomous Driving Algorithm Engineer — Learning-based Path Planning
        location: China
        start_date: 2024-07
        end_date: 2025-04
        summary: Developed learning-based path planning modules for production urban autonomous driving.
        highlights:
          - Improved occupancy-aware loss computation to enhance path safety.
          - Developed an anchor-free path planning method to improve smoothness.
          - Designed evaluation metrics and data-distribution analysis tools for model development.

    Research Projects:
      - name: Risk-Reachable Set-based Motion Planning
        start_date: 2023-11
        end_date: 2024-05
        summary: Master's thesis combining risk estimation, safe reinforcement learning, reachable sets, and constrained iLQR.
        highlights:
          - Used Gaussian-process regression to assess spatiotemporal driving risk and construct risk-reachable sets.
          - Generated initial trajectories with PPO-Lagrangian and projected them onto safe and feasible sets.
          - Improved average driving speed by 49% and reduced maximum jerk by 52% over sampling-based baselines in high-speed merging simulations.

      - name: Safe Motion Planning for Automated Valet Parking
        start_date: 2022-11
        end_date: 2023-02
        summary: Open-source trajectory planning framework for automated parking in unstructured environments.
        highlights:
          - Integrated Hybrid A*, quadratic-programming-based path optimization, interpolation, velocity planning, and optimal control.
          - Validated parallel and perpendicular parking scenarios in narrow spaces.

      - name: Optimal Trajectory Planning in Narrow Corridors
        start_date: 2022-06
        end_date: 2022-11
        summary: Space-discretization-based trajectory planning for autonomous vehicles in constrained environments.
        highlights:
          - Formulated a quadratic programming problem with vehicle, boundary, comfort, and efficiency constraints.
          - Validated the method through simulations and field experiments.

      - name: Safe Reinforcement Learning for On-Ramp Merging
        start_date: 2021-11
        end_date: 2022-06
        summary: Hierarchical decision-making framework combining safe reinforcement learning and model predictive control.
        highlights:
          - Designed a rule-based action shielding module to replace unsafe decisions during training and execution.
          - Evaluated safety and efficiency under different traffic densities.

